<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1B1E24"/>
      <stop offset="1" stop-color="#0E0F12"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.40" r="0.55">
      <stop offset="0" stop-color="#8B7DF6" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#8B7DF6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="topbar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#A99BFF"/>
      <stop offset="1" stop-color="#8B7DF6"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <rect width="512" height="512" fill="url(#glow)"/>

  <!-- the stash: a receding stack, dim -> bright -->
  <rect x="181" y="290" width="150" height="44" rx="16" fill="#8B7DF6" opacity="0.30"/>
  <rect x="171" y="248" width="170" height="44" rx="16" fill="#8B7DF6" opacity="0.55"/>

  <!-- the loaded prompt: top card lifted out, brightest -->
  <rect x="161" y="176" width="190" height="48" rx="18" fill="url(#topbar)"/>
  <rect x="173" y="184" width="118" height="6" rx="3" fill="#FFFFFF" opacity="0.30"/>
</svg>
