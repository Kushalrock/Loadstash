<svg width="1100" height="320" viewBox="0 0 1100 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="topbar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#A99BFF"/>
      <stop offset="1" stop-color="#8B7DF6"/>
    </linearGradient>
  </defs>

  <!-- transparent background; mark lockup on the left -->
  <g transform="translate(40,60) scale(0.39)">
    <rect x="181" y="290" width="150" height="44" rx="16" fill="#8B7DF6" opacity="0.30"/>
    <rect x="171" y="248" width="170" height="44" rx="16" fill="#8B7DF6" opacity="0.55"/>
    <rect x="161" y="176" width="190" height="48" rx="18" fill="url(#topbar)"/>
    <rect x="173" y="184" width="118" height="6" rx="3" fill="#FFFFFF" opacity="0.30"/>
  </g>

  <!-- wordmark: lowercase, 'load' soft-white + 'stash' periwinkle to teach the fusion -->
  <text x="250" y="200"
        font-family="Inter, 'Helvetica Neue', Arial, sans-serif"
        font-size="150" font-weight="600" letter-spacing="-4">
    <tspan fill="#ECEEF2">load</tspan><tspan fill="#8B7DF6">stash</tspan>
  </text>
</svg>
