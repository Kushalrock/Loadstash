<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  button { font-family: inherit; -webkit-tap-highlight-color: transparent; }
  input { font-family: inherit; }
  [data-noscroll] { scrollbar-width: none; }
  [data-noscroll]::-webkit-scrollbar { display: none; }
  @keyframes ls-bob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
  @keyframes ls-ring { 0% { transform: scale(1); opacity: .55; } 70% { opacity: 0; } 100% { transform: scale(2.2); opacity: 0; } }
  @keyframes ls-fadeup { from { opacity: 0; transform: translateY(9px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes ls-caret { 0%,49% { opacity: 1; } 50%,100% { opacity: 0; } }
  @keyframes ls-pop { 0% { opacity: 0; transform: scale(.6); } 60% { transform: scale(1.06); } 100% { opacity: 1; transform: scale(1); } }
</style>
</helmet>
<div style="display:flex;flex-direction:column;height:100vh;width:100%;background:#0E0F12;font-family:'Inter',system-ui,-apple-system,sans-serif;color:#ECEEF2;overflow:hidden;">
  <div style="flex:0 0 auto;display:flex;align-items:center;justify-content:space-between;padding:13px 22px;border-bottom:1px solid rgba(255,255,255,0.07);">
    <div style="display:flex;align-items:center;gap:11px;">
      <div style="width:31px;height:31px;border-radius:9px;background:rgba(139,125,246,0.14);border:1px solid rgba(139,125,246,0.28);display:flex;align-items:center;justify-content:center;">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#B9AEFF" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8 8 0 0 1-8.5 8 9 9 0 0 1-3.5-.7L3 21l1.3-4a8 8 0 0 1-.8-3.5 8 8 0 0 1 8-8 8 8 0 0 1 8.3 6z"></path><path d="M12 8.5l1 2.6 2.6 1-2.6 1-1 2.6-1-2.6-2.6-1 2.6-1z" fill="#B9AEFF" stroke="none"></path></svg>
      </div>
      <div style="display:flex;flex-direction:column;line-height:1.2;">
        <span style="font-size:15px;font-weight:600;letter-spacing:-0.01em;">Loadstash</span>
        <span style="font-size:11px;color:#686D78;">Prompt launcher · dark theme</span>
      </div>
    </div>
    <div style="position:relative;display:flex;background:#16181D;border:1px solid rgba(255,255,255,0.07);border-radius:11px;padding:3px;">
      <div style="position:absolute;top:3px;left:3px;width:calc(50% - 3px);bottom:3px;border-radius:8px;background:rgba(139,125,246,0.14);border:1px solid rgba(139,125,246,0.28);transition:transform .26s cubic-bezier(.16,1,.3,1);transform: {{ togglePos }};"></div>
      <button onClick="{{ setProto }}" style="position:relative;z-index:1;border:0;background:transparent;color: {{ protoColor }};font-size:12.5px;font-weight:500;padding:6px 17px;border-radius:8px;cursor:pointer;transition:color .2s;">Prototype</button>

  <div data-noscroll style="flex:1 1 auto;min-height:0;overflow-y:auto;">
    {{ body }}

  componentDidMount(){ if(this._t) clearInterval(this._t); this._t = setInterval(()=>this.setState(s=>({tick:(s.tick+1)%6})), 1500); this.measure(); this._rs=()=>this.measure(); window.addEventListener('resize', this._rs); }

  saveEditor(){ const e=this.state.editor; if(!e) return; const vars=this.parseVars(e.body).map(k=>({k,ph:k})); const existed=!!this.P(e.id); const obj={ title:(e.title||'').trim()||'Untitled prompt', path:(e.folderPath||[]).slice(), models:(e.models||[]).slice(), tags:(e.tags||[]).slice(), body:e.body||'', vars, pinned: existed?this.isPinned(e.id):false }; this.setState(s=>({edits:{...(s.edits||{}), [e.id]:obj}, scene:'prompt', promptId:e.id, sheet:null})); this.showToast(e.mode==='edit'?'Changes saved':'Prompt created'); }

  copyPrompt(id){ const p=this.P(id); try{ if(navigator.clipboard) navigator.clipboard.writeText(p.body); }catch(err){} this.showToast('Copied to clipboard'); }
  toggleArr(arr,v){ arr=arr||[]; return arr.includes(v)? arr.filter(x=>x!==v) : [...arr,v]; }
  setQuick(patch){ this.setState(s=>({quick:{...s.quick,...patch}})); }
  saveQuick(){ const q=this.state.quick||{}; const body=(q.body||'').trim(); if(!body) return; const vars=this.parseVars(body).map(k=>({k,ph:k})); const id='user-'+Date.now(); let title=body.split('\n')[0].replace(/\{\{\s*(\w+)\s*\}\}/g,'$1').trim(); if(title.length>42) title=title.slice(0,42).trim()+'…'; const obj={ title:title||'Quick prompt', path:(this.state.defaultFolder||[]).slice(), models:(q.models||[]).slice(), tags:[], body, vars, pinned:!!q.pinned }; this.setState(s=>({edits:{...(s.edits||{}),[id]:obj}, quick:{body:'',pinned:false,models:[]}, hostState:'picker'})); this.showToast('Saved to '+((this.state.defaultFolder&&this.state.defaultFolder.length)?this.state.defaultFolder.join(' › '):'Library')); }

  icon(name, size=20, color, sw=1.5){
    const P=this.PATHS[name]||[];
    return this.h('svg',{width:size,height:size,viewBox:'0 0 24 24',fill:'none',stroke:color||'currentColor',strokeWidth:sw,strokeLinecap:'round',strokeLinejoin:'round',style:{display:'block',flex:'0 0 auto'}},

  // ---------- small parts ----------
  modelChip(key,{withLabel=true}={}){ const m=this.MODELS[key]; if(!m) return null;

  mono(body,{vals=null,size='12px',lh=1.95}={}){
